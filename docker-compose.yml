services:
  app:
    build: .
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${COMPOSE_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/algorecall}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-${BETTER_AUTH_URL:-http://localhost:3000}}
      - APP_VERSION=${APP_VERSION:-dev}
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    port:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=algorecall
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  pgdata:
