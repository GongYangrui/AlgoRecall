services:
  app:
    build: .
    ports:
      - "127.0.0.1:${HOST_PORT:-3000}:3000"
    environment:
      - DATABASE_URL=${COMPOSE_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/algorecall}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-${BETTER_AUTH_URL:-http://localhost:3000}}
      - REDIS_URL=${COMPOSE_REDIS_URL:-redis://redis:6379}
      - APP_VERSION=${APP_VERSION:-dev}
      - TZ=${TZ:-Asia/Shanghai}
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-55432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-algorecall}
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-algorecall}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
volumes:
  pgdata:
  redisdata:
