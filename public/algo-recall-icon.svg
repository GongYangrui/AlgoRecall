<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Coding progress update icon">
  <defs>
    <linearGradient id="bgGrad" x1="512" y1="58" x2="512" y2="966" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061A55"/>
      <stop offset="0.48" stop-color="#04399D"/>
      <stop offset="1" stop-color="#056BFF"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#0B4ED6" stop-opacity="0.68"/>
      <stop offset="0.62" stop-color="#063997" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#03143D" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="arrowGrad" x1="225" y1="225" x2="820" y2="820" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1FF4B5"/>
      <stop offset="0.45" stop-color="#18DCD5"/>
      <stop offset="1" stop-color="#079BFF"/>
    </linearGradient>

    <linearGradient id="slashGrad" x1="555" y1="345" x2="462" y2="647" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#50DFFF"/>
      <stop offset="1" stop-color="#0AA7F3"/>
    </linearGradient>

    <linearGradient id="cardGrad" x1="625" y1="620" x2="940" y2="885" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#FAFCFF"/>
      <stop offset="1" stop-color="#F3F8FF"/>
    </linearGradient>

    <linearGradient id="tealGrad" x1="670" y1="585" x2="850" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1EF4B5"/>
      <stop offset="1" stop-color="#0AD2C8"/>
    </linearGradient>

    <linearGradient id="blueGrad" x1="680" y1="700" x2="900" y2="835" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2D79E8"/>
      <stop offset="1" stop-color="#045BE8"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#00113C" flood-opacity="0.28"/>
    </filter>

    <filter id="symbolShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#00113C" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="#000000"/>
  <rect x="58" y="58" width="908" height="908" rx="168" fill="url(#bgGrad)"/>
  <rect x="58" y="58" width="908" height="908" rx="168" fill="url(#bgGlow)"/>

  <!-- Main circular progress arrow -->
  <path d="M724 765 A330 330 0 1 1 702 244"
        fill="none"
        stroke="url(#arrowGrad)"
        stroke-width="66"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Arrow head -->
  <path d="M653 286
           L724 214
           C742 195 773 206 777 232
           L791 330
           C795 360 771 379 742 373
           L646 353
           C620 348 613 315 633 299
           Z"
        fill="#20E7C8"/>

  <!-- Right-side progress segment, partly hidden by the card -->
  <path d="M820 399 A330 330 0 0 1 781 681"
        fill="none"
        stroke="url(#arrowGrad)"
        stroke-width="52"
        stroke-linecap="round"/>

  <!-- Code symbols -->
  <g filter="url(#symbolShadow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M408 390 L315 486 L408 582" stroke="#FFFFFF" stroke-width="58"/>
    <path d="M618 390 L711 486 L618 582" stroke="#FFFFFF" stroke-width="58"/>
    <path d="M545 366 L468 617" stroke="url(#slashGrad)" stroke-width="52"/>
  </g>

  <!-- Checklist / calendar card -->
  <g filter="url(#softShadow)">
    <rect x="620" y="612" width="326" height="260" rx="49" fill="url(#cardGrad)"/>
  </g>

  <!-- Binding tabs -->
  <rect x="690" y="580" width="39" height="80" rx="20" fill="url(#tealGrad)"/>
  <rect x="832" y="580" width="39" height="80" rx="20" fill="url(#tealGrad)"/>

  <!-- Checklist marks and lines -->
  <path d="M672 718 L701 747 L751 694"
        fill="none"
        stroke="#12D9B8"
        stroke-width="23"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <path d="M768 718 H886" stroke="url(#blueGrad)" stroke-width="23" stroke-linecap="round"/>
  <circle cx="697" cy="813" r="31" fill="url(#blueGrad)"/>
  <path d="M768 812 H886" stroke="url(#blueGrad)" stroke-width="23" stroke-linecap="round"/>
</svg>
